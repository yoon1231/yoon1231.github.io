<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Blog</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0c;
    --bg: #f7f4ef;
    --muted: #7a7468;
    --accent: #b8956a;
    --border: #e0dbd1;
    --card: #faf8f4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--ink); font-family: 'Jost', sans-serif; font-weight: 300; line-height: 1.7; }

  #hero { position: relative; width: 100%; height: 100vh; min-height: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
  #hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; background-repeat: no-repeat; background-color: #1a1714; }
  #hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.45) 50%, rgba(0,0,0,0.72) 100%); z-index: 1; }
  .hero-content { position: relative; z-index: 2; text-align: center; color: #fff; padding: 0 1.5rem; max-width: 720px; animation: fadeUp .9s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
  .hero-eyebrow { font-size: .7rem; letter-spacing: .25em; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 1.25rem; font-weight: 400; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(3.2rem, 9vw, 6.5rem); line-height: 1.05; font-weight: 700; margin-bottom: 1.25rem; letter-spacing: -.015em; }
  .hero-subtitle { font-size: clamp(.9rem, 2vw, 1.1rem); color: rgba(255,255,255,.6); font-weight: 300; margin-bottom: 2.75rem; max-width: 420px; margin-left: auto; margin-right: auto; line-height: 1.75; }
  .hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn-primary { background: #fff; color: var(--ink); border: none; padding: .9rem 2.2rem; border-radius: 2px; font-family: 'Jost', sans-serif; font-size: .78rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; cursor: pointer; transition: background .2s, color .2s; }
  .btn-primary:hover { background: var(--accent); color: #fff; }
  .btn-ghost { background: transparent; color: rgba(255,255,255,.75); border: 1px solid rgba(255,255,255,.35); padding: .9rem 2.2rem; border-radius: 2px; font-family: 'Jost', sans-serif; font-size: .78rem; font-weight: 400; letter-spacing: .12em; text-transform: uppercase; cursor: pointer; transition: all .2s; }
  .btn-ghost:hover { border-color: rgba(255,255,255,.75); color: #fff; }
  .hero-upload-hint { position: absolute; bottom: 1.75rem; right: 2rem; z-index: 3; }
  .btn-upload { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.22); color: rgba(255,255,255,.55); font-family: 'Jost', sans-serif; font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; padding: .5rem 1rem; border-radius: 2px; cursor: pointer; transition: all .2s; backdrop-filter: blur(6px); }
  .btn-upload:hover { background: rgba(255,255,255,.2); color: rgba(255,255,255,.9); }
  #bg-file-input { display: none; }
  .scroll-indicator { position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); z-index: 3; display: flex; flex-direction: column; align-items: center; gap: .5rem; color: rgba(255,255,255,.35); font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; animation: bob 2.2s ease-in-out infinite; }
  .scroll-line { width: 1px; height: 34px; background: linear-gradient(to bottom, rgba(255,255,255,.4), transparent); }
  @keyframes bob { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(6px); } }

  #sticky-nav { position: fixed; top: 0; left: 0; right: 0; height: 58px; background: rgba(247,244,239,.96); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(1rem,5vw,3rem); z-index: 200; transform: translateY(-100%); transition: transform .35s cubic-bezier(.2,.8,.2,1); }
  #sticky-nav.visible { transform: translateY(0); }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; cursor: pointer; letter-spacing: -.01em; }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links button { background: none; border: none; cursor: pointer; font-family: 'Jost', sans-serif; font-size: .75rem; font-weight: 400; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); transition: color .2s; }
  .nav-links button:hover, .nav-links button.active { color: var(--ink); }

  #app { max-width: 760px; margin: 0 auto; padding: clamp(3rem,8vw,5.5rem) clamp(1rem,5vw,2rem); }
  .view { display: none; }
  .view.active { display: block; }
  .section-label { font-size: .68rem; letter-spacing: .22em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 2.5rem; display: flex; align-items: center; gap: 1rem; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .posts-list { list-style: none; }
  .post-item { border-top: 1px solid var(--border); padding: 2rem 0; cursor: pointer; display: grid; grid-template-columns: 1fr auto; gap: 1.5rem; align-items: start; transition: opacity .2s; }
  .post-item:hover { opacity: .6; }
  .post-item:last-child { border-bottom: 1px solid var(--border); }
  .post-meta { display:flex; gap:.75rem; align-items:center; margin-bottom:.55rem; }
  .post-tag { font-size:.66rem; text-transform:uppercase; letter-spacing:.13em; color:var(--accent); font-weight:500; }
  .post-date { font-size:.77rem; color:var(--muted); }
  .post-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; line-height: 1.25; margin-bottom: .45rem; font-weight: 400; }
  .post-excerpt { font-size:.875rem; color:var(--muted); line-height:1.65; }
  .post-arrow { color:var(--muted); font-size:1.1rem; margin-top:.3rem; transition:transform .2s; }
  .post-item:hover .post-arrow { transform: translateX(5px); }
  .empty-state { text-align:center; padding:5rem 0; color:var(--muted); }
  .empty-state strong { display:block; font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--ink); font-weight:400; margin-bottom:.5rem; }

  .back-btn { background:none; border:none; cursor:pointer; font-family:'Jost',sans-serif; font-size:.75rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:.5rem; margin-bottom:3rem; padding:0; transition:color .2s; }
  .back-btn:hover { color:var(--ink); }
  .art-tag { font-size:.66rem; text-transform:uppercase; letter-spacing:.15em; color:var(--accent); font-weight:500; margin-bottom:1rem; }
  .art-title { font-family:'Playfair Display',serif; font-size: clamp(2rem, 5vw, 3.1rem); line-height:1.1; margin-bottom:1rem; font-weight:700; letter-spacing:-.015em; }
  .art-meta { display:flex; gap:1.5rem; font-size:.77rem; color:var(--muted); letter-spacing:.04em; padding-bottom:2.5rem; border-bottom:1px solid var(--border); margin-bottom:3rem; }
  .art-body { font-size:1.05rem; line-height:1.9; }
  .art-body p { margin-bottom:1.6rem; }
  .art-body h2 { font-family:'Playfair Display',serif; font-size:1.55rem; margin:3rem 0 1rem; font-weight:400; }
  .art-body blockquote { border-left:2px solid var(--accent); padding-left:1.5rem; margin:2.5rem 0; color:var(--muted); font-style:italic; font-size:1.1rem; }

  .write-heading { margin-bottom:2.5rem; }
  .write-heading h2 { font-family:'Playfair Display',serif; font-size:2rem; font-weight:400; }
  .write-heading p { color:var(--muted); font-size:.875rem; margin-top:.35rem; }
  .form-row { margin-bottom:1.25rem; }
  .form-row label { display:block; font-size:.68rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:.5rem; font-weight:500; }
  .form-row input, .form-row textarea { width:100%; background:var(--card); border:1px solid var(--border); border-radius:2px; padding:.8rem 1rem; font-family:'Jost',sans-serif; font-size:.95rem; color:var(--ink); outline:none; transition:border-color .2s; font-weight:300; }
  .form-row input:focus, .form-row textarea:focus { border-color:var(--ink); }
  .form-row textarea { resize:vertical; min-height:340px; line-height:1.75; }
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .form-actions { display:flex; gap:.75rem; margin-top:.5rem; align-items:center; }
  .btn-dark { background:var(--ink); color:var(--bg); border:none; padding:.85rem 2rem; border-radius:2px; font-family:'Jost',sans-serif; font-size:.78rem; font-weight:500; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; transition:background .2s; display:flex; align-items:center; gap:.5rem; }
  .btn-dark:hover { background:var(--accent); }
